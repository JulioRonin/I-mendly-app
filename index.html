<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="I mendly — Servicios del hogar con confianza" />
    <title>I mendly — Servicios del hogar con confianza</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              inter:   ['Inter', 'system-ui', 'sans-serif'],
              syne:    ['Inter', 'system-ui', 'sans-serif'],
              jakarta: ['Inter', 'system-ui', 'sans-serif'],
            },
            colors: {
              'im-bg':       '#F6F5F2',
              'im-white':    '#FFFFFF',
              'im-violet':   '#6C5CE7',
              'im-violet-l': '#A29BFE',
              'im-violet-d': '#5A4BD1',
              'im-orange':   '#FF6B35',
              'im-orange-l': '#FF8A5C',
              'im-ink':      '#16162A',
              'im-ink-l':    '#2D2D44',
              'im-gray':     '#9A9AAF',
              'im-gray-l':   '#C8C8D4',
              'im-border':   '#EEEDF0',
              'im-border-d': '#DDDCE0',
              'im-success':  '#00B894',
              'im-warning':  '#FDCB6E',
              'im-error':    '#FF6B6B',
              'im-info':     '#74B9FF',
              /* Legacy aliases so unchanged components compile */
              'im-dark':     '#16162A',
              'im-navy':     '#2D2D44',
              'im-coral':    '#FF6B35',
              'im-coral-dk': '#E05A2A',
              'im-teal':     '#6C5CE7',
              'im-teal-lt':  '#A29BFE',
              'im-surface':  '#F6F5F2',
              'im-gray-600': '#6B6B80',
              'im-gray-400': '#9A9AAF',
              'im-gray-200': '#EEEDF0',
              'im-gray-100': '#F6F5F2',
            },
            borderRadius: {
              'pill': '9999px',
              '3xl':  '24px',
              '4xl':  '32px',
            },
            boxShadow: {
              'sm':      '0 1px 3px rgba(22,22,42,0.04)',
              'card':    '0 2px 12px rgba(22,22,42,0.06), 0 0 1px rgba(22,22,42,0.08)',
              'card-lg': '0 8px 30px rgba(22,22,42,0.08), 0 0 1px rgba(22,22,42,0.10)',
              'float':   '0 8px 40px rgba(22,22,42,0.12)',
              'nav':     '0 -4px 30px rgba(22,22,42,0.08)',
              'violet':  '0 6px 24px rgba(108,92,231,0.35)',
              'orange':  '0 6px 24px rgba(255,107,53,0.30)',
              'glow':    '0 0 40px rgba(108,92,231,0.12)',
              /* Legacy */
              'coral':   '0 6px 24px rgba(255,107,53,0.30)',
              'teal':    '0 6px 24px rgba(108,92,231,0.30)',
              'navy':    '0 4px 24px rgba(22,22,42,0.15)',
            },
            animation: {
              'fade-in':        'fadeIn 0.5s ease-out forwards',
              'slide-up':       'slideUp 0.55s cubic-bezier(0.16,1,0.3,1) forwards',
              'slide-down':     'slideDown 0.4s cubic-bezier(0.16,1,0.3,1) forwards',
              'scale-in':       'scaleIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards',
              'float':          'float 5s ease-in-out infinite',
              'pulse-slow':     'pulse 3s cubic-bezier(0.4,0,0.6,1) infinite',
              'shimmer':        'shimmer 2s infinite',
              'glow-pulse':     'glowPulse 2s ease-in-out infinite',
              'card-in':        'cardIn 0.55s cubic-bezier(0.16,1,0.3,1) forwards',
              'bar-grow':       'barGrow 0.8s cubic-bezier(0.16,1,0.3,1) forwards',
              'slide-in-right': 'slideInRight 0.4s cubic-bezier(0.16,1,0.3,1) forwards',
              'slide-in-left':  'slideInLeft 0.4s cubic-bezier(0.16,1,0.3,1) forwards',
              'spin-slow':      'spin 14s linear infinite',
              'bounce-sm':      'bounceSm 0.5s cubic-bezier(0.34,1.56,0.64,1)',
              'ripple':         'ripple 0.6s ease-out forwards',
            },
            keyframes: {
              fadeIn:       { from: { opacity: '0' }, to: { opacity: '1' } },
              slideUp:      { from: { opacity: '0', transform: 'translateY(32px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
              slideDown:    { from: { opacity: '0', transform: 'translateY(-20px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
              scaleIn:      { from: { opacity: '0', transform: 'scale(0.85)' }, to: { opacity: '1', transform: 'scale(1)' } },
              cardIn:       { from: { opacity: '0', transform: 'translateY(24px) scale(0.96)' }, to: { opacity: '1', transform: 'translateY(0) scale(1)' } },
              float:        { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-8px)' } },
              shimmer:      { from: { backgroundPosition: '-200% center' }, to: { backgroundPosition: '200% center' } },
              glowPulse:    { '0%,100%': { opacity: '0.5' }, '50%': { opacity: '1' } },
              barGrow:      { from: { transform: 'scaleY(0)', transformOrigin: 'bottom' }, to: { transform: 'scaleY(1)', transformOrigin: 'bottom' } },
              bounceSm:     { '0%': { transform: 'scale(0.9)' }, '60%': { transform: 'scale(1.05)' }, '100%': { transform: 'scale(1)' } },
              ripple:       { from: { transform: 'scale(0)', opacity: '0.5' }, to: { transform: 'scale(4)', opacity: '0' } },
              slideInRight: { from: { opacity: '0', transform: 'translateX(30px)' }, to: { opacity: '1', transform: 'translateX(0)' } },
              slideInLeft:  { from: { opacity: '0', transform: 'translateX(-30px)' }, to: { opacity: '1', transform: 'translateX(0)' } },
            },
          }
        }
      }
    </script>

    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --im-bg:      #F6F5F2;
        --im-white:   #FFFFFF;
        --im-violet:  #6C5CE7;
        --im-orange:  #FF6B35;
        --im-ink:     #16162A;
        --im-gray:    #9A9AAF;
        --im-border:  #EEEDF0;
        --font:       'Inter', system-ui, sans-serif;
      }

      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: var(--font);
        background-color: var(--im-bg);
        color: var(--im-ink);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      ::-webkit-scrollbar { width: 0; height: 0; }
      * { scrollbar-width: none; }

      h1, h2, h3, h4 {
        font-family: var(--font);
        letter-spacing: -0.03em;
        font-weight: 800;
        line-height: 1.15;
        color: var(--im-ink);
      }

      /* ── GLASS / LEGACY ── */
      .glass {
        background: rgba(255,255,255,0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--im-border);
      }
      .glass-dark {
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-top: 1px solid var(--im-border);
      }
      .glass-light {
        background: rgba(255,255,255,0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--im-border);
      }

      /* ── CARDS ── */
      .card-white {
        background: var(--im-white);
        border: 1px solid var(--im-border);
        border-radius: 24px;
        box-shadow: 0 2px 12px rgba(22,22,42,0.06), 0 0 1px rgba(22,22,42,0.08);
      }
      .card-dark {
        background: var(--im-white);
        border: 1px solid var(--im-border);
        border-radius: 24px;
        box-shadow: 0 2px 12px rgba(22,22,42,0.06);
      }

      /* ── BUTTONS ── */
      .btn-primary, .btn-coral, .btn-teal {
        background: var(--im-orange);
        color: white;
        border: none;
        border-radius: 9999px;
        font-family: var(--font);
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
        box-shadow: 0 6px 24px rgba(255,107,53,0.30);
        letter-spacing: -0.01em;
      }
      .btn-primary:hover, .btn-coral:hover, .btn-teal:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 32px rgba(255,107,53,0.40);
      }
      .btn-primary:active, .btn-coral:active, .btn-teal:active {
        transform: translateY(0);
        box-shadow: 0 3px 12px rgba(255,107,53,0.25);
      }

      .btn-purple {
        background: var(--im-violet);
        color: white;
        border: none;
        border-radius: 9999px;
        font-family: var(--font);
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
        box-shadow: 0 6px 24px rgba(108,92,231,0.35);
      }
      .btn-purple:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(108,92,231,0.45); }

      .btn-outline, .btn-ghost, .btn-navy {
        background: transparent;
        color: var(--im-ink);
        border: 1.5px solid var(--im-border);
        border-radius: 9999px;
        font-family: var(--font);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .btn-outline:hover, .btn-ghost:hover, .btn-navy:hover {
        background: rgba(22,22,42,0.04);
        border-color: var(--im-border-d, #DDDCE0);
      }

      /* ── INPUTS ── */
      .input-pill {
        background: var(--im-white);
        border: 1.5px solid var(--im-border);
        border-radius: 9999px;
        color: var(--im-ink);
        font-family: var(--font);
        font-size: 15px;
        transition: all 0.25s ease;
        outline: none;
        width: 100%;
        box-shadow: 0 1px 3px rgba(22,22,42,0.04);
      }
      .input-pill::placeholder { color: #B8B8C8; }
      .input-pill:focus {
        border-color: var(--im-violet);
        box-shadow: 0 0 0 4px rgba(108,92,231,0.10), 0 2px 8px rgba(22,22,42,0.06);
      }
      /* Legacy alias */
      .input-dark {
        background: var(--im-white);
        border: 1.5px solid var(--im-border);
        border-radius: 16px;
        color: var(--im-ink);
        font-family: var(--font);
        font-size: 15px;
        transition: all 0.25s ease;
        outline: none;
        width: 100%;
      }
      .input-dark::placeholder { color: #B8B8C8; }
      .input-dark:focus { border-color: var(--im-violet); box-shadow: 0 0 0 4px rgba(108,92,231,0.10); }

      /* ── BADGES ── */
      .badge-violet, .badge-coral, .badge-teal {
        background: rgba(108,92,231,0.10);
        color: var(--im-violet);
        border: 1px solid rgba(108,92,231,0.15);
        border-radius: 9999px;
        font-size: 11px;
        font-weight: 700;
        font-family: var(--font);
      }
      .badge-success {
        background: rgba(0,184,148,0.10);
        color: #00B894;
        border: 1px solid rgba(0,184,148,0.20);
        border-radius: 9999px;
        font-size: 11px;
        font-weight: 700;
        font-family: var(--font);
      }

      /* ── PROGRESS ── */
      .progress-bar  { background: var(--im-border); border-radius: 9999px; overflow: hidden; }
      .progress-fill { background: linear-gradient(90deg, var(--im-violet) 0%, var(--im-orange) 100%); border-radius: 9999px; transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }

      /* ── UTILITIES ── */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      .hover-lift {
        transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      }
      .hover-lift:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 36px rgba(22,22,42,0.10);
      }

      .text-gradient {
        background: linear-gradient(135deg, var(--im-violet) 0%, var(--im-orange) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .text-gradient-coral { background: linear-gradient(135deg, var(--im-violet) 0%, var(--im-orange) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
      .text-gradient-teal  { background: linear-gradient(135deg, var(--im-violet) 0%, var(--im-orange) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

      .notif-dot {
        width: 8px; height: 8px;
        background: var(--im-orange);
        border-radius: 50%;
        border: 2px solid var(--im-white);
        position: absolute;
        top: -2px; right: -2px;
      }

      /* ── STEPS / NAV ── */
      .step-done    { background: #00B894; color: white; }
      .step-active  { background: var(--im-violet); color: white; box-shadow: 0 4px 12px rgba(108,92,231,0.35); }
      .step-pending { background: var(--im-border); color: var(--im-gray); }
      .nav-active   { color: var(--im-violet); }
      .nav-inactive { color: var(--im-gray); }

      /* ── ESCROW ── */
      .escrow-held     { background: rgba(253,203,110,0.15); border: 1px solid rgba(253,203,110,0.3); color: #E17055; }
      .escrow-released { background: rgba(0,184,148,0.10); border: 1px solid rgba(0,184,148,0.20); color: #00B894; }
      .escrow-disputed { background: rgba(255,107,107,0.10); border: 1px solid rgba(255,107,107,0.20); color: #FF6B6B; }

      /* ── DELAYS ── */
      .delay-1 { animation-delay: 60ms; }
      .delay-2 { animation-delay: 120ms; }
      .delay-3 { animation-delay: 180ms; }
      .delay-4 { animation-delay: 240ms; }
      .delay-5 { animation-delay: 300ms; }
      .delay-6 { animation-delay: 360ms; }

      /* ── MISC ── */
      .blob-coral  { background: radial-gradient(circle, rgba(255,107,53,0.10) 0%, transparent 70%); border-radius: 50%; filter: blur(60px); pointer-events: none; }
      .blob-teal   { background: radial-gradient(circle, rgba(108,92,231,0.08) 0%, transparent 70%); border-radius: 50%; filter: blur(60px); pointer-events: none; }
      .chart-bar   { border-radius: 6px 6px 0 0; transition: height 0.6s cubic-bezier(0.16,1,0.3,1); min-height: 4px; }
      select.input-dark option { background: white; color: var(--im-ink); }
      *:focus-visible { outline: 2px solid var(--im-violet); outline-offset: 2px; border-radius: 4px; }

      /* ── PHOTO OVERLAY ── */
      .photo-overlay-light {
        background: linear-gradient(to top, white 0%, rgba(255,255,255,0.8) 30%, transparent 60%);
      }
      .photo-overlay-dark {
        background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
      }

      /* ── FLOATING NAV ── */
      .floating-nav {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--im-white);
        border-radius: 9999px;
        padding: 6px;
        display: flex;
        gap: 4px;
        box-shadow: 0 8px 40px rgba(22,22,42,0.14), 0 0 1px rgba(22,22,42,0.12);
        z-index: 50;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
