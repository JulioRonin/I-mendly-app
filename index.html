<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>imendly — Servicios a domicilio</title>

  <!-- Fonts: Outfit (Gilroy-equivalent) + Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'im-bg':     '#EFEFEF',
            'im-mint':   '#C1E8D5',
            'im-black':  '#0A0A0A',
            'im-gray':   '#6A6A6A',
            'im-white':  '#FFFFFF',
            'im-border': 'rgba(0,0,0,0.06)',
          },
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            body:    ['Inter', 'sans-serif'],
          },
          borderRadius: {
            '4xl': '2rem',
            '5xl': '2.5rem',
          },
          boxShadow: {
            'card':    '8px 8px 24px rgba(0,0,0,0.08), -4px -4px 14px rgba(255,255,255,0.85)',
            'card-sm': '4px 4px 12px rgba(0,0,0,0.07), -2px -2px 8px rgba(255,255,255,0.8)',
            'inset':   'inset 3px 3px 8px rgba(0,0,0,0.08), inset -3px -3px 8px rgba(255,255,255,0.9)',
            'btn':     '4px 8px 20px rgba(0,0,0,0.25)',
            'mint':    '0 6px 20px rgba(193,232,213,0.6)',
          },
        },
      },
    };
  </script>

  <style>
    /* ── DESIGN TOKENS ── */
    :root {
      --bg:        #EFEFEF;
      --card:      #FFFFFF;
      --mint:      #C1E8D5;
      --mint-dk:   #89C9AA;
      --black:     #0A0A0A;
      --gray:      #6A6A6A;
      --gray-lt:   #B0B0B0;
      --white:     #FFFFFF;
      --border:    rgba(0,0,0,0.06);
      --radius-card: 24px;
      --radius-chip: 9999px;
      --shadow-card: 8px 8px 24px rgba(0,0,0,0.08), -4px -4px 14px rgba(255,255,255,0.85);
      --shadow-sm:   4px 4px 12px rgba(0,0,0,0.07), -2px -2px 8px rgba(255,255,255,0.8);
      --shadow-inset: inset 3px 3px 8px rgba(0,0,0,0.08), inset -3px -3px 8px rgba(255,255,255,0.9);

      /* Legacy aliases → new tokens */
      --im-bg:        var(--bg);
      --im-purple:    var(--black);
      --im-purple-dk: var(--black);
      --im-ink:       var(--black);
      --im-border:    var(--border);
      --im-coral:     var(--mint-dk);
      --im-teal:      var(--mint);
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── SCROLLBAR HIDE ── */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── TYPOGRAPHY ── */
    .heading-xl {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.0;
      color: var(--black);
    }
    .heading-lg {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--black);
    }
    .heading-md {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--black);
    }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
    }
    .card-gray {
      background: var(--bg);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-sm);
    }

    /* ── BUTTONS ── */
    .btn-primary {
      background: var(--black);
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      border: none;
      border-radius: var(--radius-chip);
      cursor: pointer;
      box-shadow: 4px 8px 20px rgba(0,0,0,0.22);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 4px 10px 24px rgba(0,0,0,0.28); }
    .btn-primary:active { transform: translateY(0); }

    .btn-mint {
      background: var(--mint);
      color: var(--black);
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      border: none;
      border-radius: var(--radius-chip);
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(193,232,213,0.55);
      transition: transform 0.15s ease;
    }
    .btn-mint:hover { transform: translateY(-1px); }

    .btn-ghost {
      background: transparent;
      color: var(--black);
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      border: 2px solid rgba(0,0,0,0.12);
      border-radius: var(--radius-chip);
      cursor: pointer;
      transition: border-color 0.15s ease;
    }
    .btn-ghost:hover { border-color: rgba(0,0,0,0.3); }

    /* ── CHIPS ── */
    .chip {
      background: var(--bg);
      box-shadow: var(--shadow-sm);
      border-radius: var(--radius-chip);
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--gray);
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .chip-dark {
      background: #1A1A1A;
      color: var(--white);
      border-radius: 18px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      border: none;
    }
    .chip-dark.active, .chip-dark[data-active="true"] {
      background: var(--mint);
      color: var(--black);
    }
    .chip.active {
      background: var(--black);
      color: var(--white);
      box-shadow: 4px 4px 12px rgba(0,0,0,0.2);
    }

    /* ── FORM FIELDS ── */
    .field-label {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--black);
      letter-spacing: -0.01em;
      margin-bottom: 6px;
      display: block;
    }
    .input-field {
      width: 100%;
      background: var(--bg);
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--black);
      box-shadow: var(--shadow-inset);
      outline: none;
      transition: box-shadow 0.2s ease;
    }
    .input-field::placeholder { color: var(--gray-lt); }
    .input-field:focus { box-shadow: inset 3px 3px 8px rgba(0,0,0,0.10), inset -3px -3px 8px rgba(255,255,255,0.9), 0 0 0 2px var(--mint); }

    /* ── SEARCH BAR ── */
    .search-pill {
      background: var(--white);
      border-radius: 9999px;
      box-shadow: var(--shadow-card);
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray);
      padding: 14px 20px;
    }
    .search-pill:focus { outline: none; }

    /* ── BOTTOM NAV ── */
    .floating-nav {
      background: var(--white);
      box-shadow: 0 -4px 24px rgba(0,0,0,0.06);
      border-top: 1px solid rgba(0,0,0,0.04);
    }

    /* ── BADGE ── */
    .badge-pill {
      display: inline-flex;
      align-items: center;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: var(--mint);
      color: var(--black);
      border-radius: 9999px;
      padding: 5px 14px;
    }

    /* ── DARK SECTION ── */
    .section-dark {
      background: var(--black);
      border-radius: 24px;
      color: var(--white);
    }

    /* ── PROGRESS ── */
    .progress-bar {
      background: rgba(0,0,0,0.08);
      border-radius: 9999px;
      overflow: hidden;
    }
    .progress-fill {
      background: var(--black);
      border-radius: 9999px;
      transition: width 0.4s ease;
    }

    /* ── HOVER LIFT ── */
    .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .hover-lift:hover { transform: translateY(-2px); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }
    .animate-fade-up   { animation: fadeUp  0.45s cubic-bezier(0.22,1,0.36,1) both; }
    .animate-scale-in  { animation: scaleIn 0.35s cubic-bezier(0.22,1,0.36,1) both; }
    .animate-slide-up  { animation: fadeUp  0.4s  cubic-bezier(0.22,1,0.36,1) both; }

    /* ── LEGACY COMPAT ── */
    .btn-coral      { background: var(--black); color: white; font-family: 'Outfit', sans-serif; font-weight: 700; border: none; border-radius: 9999px; cursor: pointer; }
    .btn-teal       { background: var(--mint); color: var(--black); font-family: 'Outfit', sans-serif; font-weight: 700; border: none; border-radius: 9999px; cursor: pointer; }
    .badge-coral    { background: rgba(193,232,213,0.2); color: var(--black); font-family: 'Outfit', sans-serif; font-weight: 700; border-radius: 9999px; font-size: 11px; padding: 3px 10px; }
    .badge-teal     { background: var(--mint); color: var(--black); font-family: 'Outfit', sans-serif; font-weight: 700; border-radius: 9999px; font-size: 11px; padding: 3px 10px; }
    .badge-success  { background: rgba(193,232,213,0.3); color: #1a7a4a; font-family: 'Outfit', sans-serif; font-weight: 700; border-radius: 9999px; font-size: 11px; padding: 3px 10px; }
    .glass          { background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); }
    .input-dark     { background: #1F1F1F; color: white; border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; font-family: 'Inter', sans-serif; outline: none; }
    .pb-safe        { padding-bottom: env(safe-area-inset-bottom, 16px); }
    .blob-coral     { border-radius: 50%; background: var(--mint); filter: blur(60px); pointer-events: none; }
    .input-pill     { background: var(--white); border-radius: 9999px; box-shadow: var(--shadow-card); border: none; font-family: 'Outfit', sans-serif; outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
