<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="I mendly — Servicios del hogar con confianza. Conectamos clientes con profesionales verificados en México." />
    <title>I mendly — Servicios del hogar con confianza</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              inter:    ['Inter', 'sans-serif'],
              syne:     ['Inter', 'sans-serif'],
              jakarta:  ['Inter', 'sans-serif'],
            },
            colors: {
              'im-black':    '#0A0A0A',
              'im-dark':     '#111111',
              'im-surface':  '#1A1A1A',
              'im-border':   '#2A2A2A',
              'im-purple':   '#7C3AED',
              'im-purple-l': '#8B5CF6',
              'im-purple-xl':'#A78BFA',
              'im-coral':    '#7C3AED',
              'im-coral-dk': '#6D28D9',
              'im-teal':     '#8B5CF6',
              'im-teal-lt':  '#A78BFA',
              'im-navy':     '#111111',
              'im-white':    '#FFFFFF',
              'im-gray-600': '#666666',
              'im-gray-400': '#A0A0A0',
              'im-gray-200': '#2A2A2A',
              'im-gray-100': '#1A1A1A',
              'im-success':  '#10B981',
              'im-warning':  '#F59E0B',
              'im-error':    '#EF4444',
              'im-info':     '#3B82F6',
            },
            borderRadius: {
              'pill': '999px',
              '3xl':  '24px',
              '4xl':  '32px',
            },
            boxShadow: {
              'card':     '0 2px 8px rgba(0,0,0,0.5), 0 8px 24px rgba(0,0,0,0.4)',
              'card-lg':  '0 4px 16px rgba(0,0,0,0.6), 0 16px 48px rgba(0,0,0,0.5)',
              'coral':    '0 4px 24px rgba(124,58,237,0.4)',
              'teal':     '0 4px 24px rgba(139,92,246,0.35)',
              'navy':     '0 4px 24px rgba(0,0,0,0.5)',
              'glow':     '0 0 60px rgba(124,58,237,0.2)',
              'purple':   '0 4px 24px rgba(124,58,237,0.4)',
              'purple-lg':'0 8px 40px rgba(124,58,237,0.5)',
            },
            animation: {
              'fade-in':        'fadeIn 0.4s ease-out forwards',
              'slide-up':       'slideUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards',
              'slide-down':     'slideDown 0.35s cubic-bezier(0.16,1,0.3,1) forwards',
              'scale-in':       'scaleIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards',
              'float':          'float 6s ease-in-out infinite',
              'pulse-slow':     'pulse 3s cubic-bezier(0.4,0,0.6,1) infinite',
              'shimmer':        'shimmer 2s infinite',
              'glow-pulse':     'glowPulse 2s ease-in-out infinite',
              'card-in':        'cardIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards',
              'bar-grow':       'barGrow 0.8s cubic-bezier(0.16,1,0.3,1) forwards',
              'ripple':         'ripple 0.6s ease-out forwards',
              'slide-in-right': 'slideInRight 0.4s cubic-bezier(0.16,1,0.3,1) forwards',
              'slide-in-left':  'slideInLeft 0.4s cubic-bezier(0.16,1,0.3,1) forwards',
              'spin-slow':      'spin 12s linear infinite',
            },
            keyframes: {
              fadeIn:       { from: { opacity: '0' }, to: { opacity: '1' } },
              slideUp:      { from: { opacity: '0', transform: 'translateY(28px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
              slideDown:    { from: { opacity: '0', transform: 'translateY(-16px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
              scaleIn:      { from: { opacity: '0', transform: 'scale(0.88)' }, to: { opacity: '1', transform: 'scale(1)' } },
              cardIn:       { from: { opacity: '0', transform: 'translateY(20px) scale(0.97)' }, to: { opacity: '1', transform: 'translateY(0) scale(1)' } },
              float:        { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
              shimmer:      { from: { backgroundPosition: '-200% center' }, to: { backgroundPosition: '200% center' } },
              glowPulse:    { '0%,100%': { opacity: '0.5' }, '50%': { opacity: '1' } },
              barGrow:      { from: { transform: 'scaleY(0)', transformOrigin: 'bottom' }, to: { transform: 'scaleY(1)', transformOrigin: 'bottom' } },
              ripple:       { from: { transform: 'scale(0)', opacity: '0.5' }, to: { transform: 'scale(4)', opacity: '0' } },
              slideInRight: { from: { opacity: '0', transform: 'translateX(24px)' }, to: { opacity: '1', transform: 'translateX(0)' } },
              slideInLeft:  { from: { opacity: '0', transform: 'translateX(-24px)' }, to: { opacity: '1', transform: 'translateX(0)' } },
            },
          }
        }
      }
    </script>

    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --im-black:    #0A0A0A;
        --im-dark:     #111111;
        --im-surface:  #1A1A1A;
        --im-border:   #2A2A2A;
        --im-purple:   #7C3AED;
        --im-purple-l: #8B5CF6;
        --font:        'Inter', sans-serif;
      }

      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: var(--font);
        background-color: var(--im-black);
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      ::-webkit-scrollbar { width: 0; height: 0; }
      * { scrollbar-width: none; }

      h1, h2, h3, h4 {
        font-family: var(--font);
        letter-spacing: -0.04em;
        font-weight: 800;
        line-height: 1.1;
      }

      /* ── GLASS ── */
      .glass {
        background: rgba(255,255,255,0.04);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.07);
      }
      .glass-dark {
        background: rgba(10,10,10,0.9);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-top: 1px solid rgba(255,255,255,0.05);
      }
      .glass-light {
        background: rgba(255,255,255,0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,0.06);
      }

      /* ── CARDS ── */
      .card-dark {
        background: var(--im-surface);
        border: 1px solid var(--im-border);
        border-radius: 20px;
      }

      /* ── BUTTONS ── */
      .btn-purple, .btn-coral, .btn-teal {
        background: var(--im-purple);
        color: white;
        border: none;
        border-radius: 999px;
        font-family: var(--font);
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 20px rgba(124,58,237,0.4);
        letter-spacing: -0.01em;
      }
      .btn-purple:hover, .btn-coral:hover, .btn-teal:hover  {
        background: var(--im-purple-l);
        transform: translateY(-1px);
        box-shadow: 0 6px 28px rgba(124,58,237,0.5);
      }
      .btn-purple:active, .btn-coral:active, .btn-teal:active {
        transform: translateY(0);
        box-shadow: 0 2px 12px rgba(124,58,237,0.3);
      }

      .btn-dark, .btn-navy {
        background: var(--im-surface);
        color: white;
        border: 1px solid var(--im-border);
        border-radius: 999px;
        font-family: var(--font);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .btn-dark:hover, .btn-navy:hover { background: #242424; border-color: #3A3A3A; }

      .btn-ghost {
        background: transparent;
        color: rgba(255,255,255,0.7);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 999px;
        font-family: var(--font);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .btn-ghost:hover { background: rgba(255,255,255,0.06); color: white; }

      /* ── INPUTS ── */
      .input-dark {
        background: var(--im-surface);
        border: 1px solid var(--im-border);
        border-radius: 14px;
        color: white;
        font-family: var(--font);
        font-size: 15px;
        transition: all 0.2s ease;
        outline: none;
        width: 100%;
      }
      .input-dark::placeholder { color: rgba(255,255,255,0.22); }
      .input-dark:focus {
        border-color: var(--im-purple);
        background: rgba(124,58,237,0.06);
        box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
      }

      /* ── BADGES ── */
      .badge-purple, .badge-coral, .badge-teal {
        background: rgba(124,58,237,0.15);
        color: #A78BFA;
        border: 1px solid rgba(124,58,237,0.25);
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        font-family: var(--font);
        letter-spacing: 0.2px;
      }
      .badge-success {
        background: rgba(16,185,129,0.12);
        color: #10B981;
        border: 1px solid rgba(16,185,129,0.22);
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        font-family: var(--font);
      }

      /* ── PROGRESS ── */
      .progress-bar  { background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; }
      .progress-fill { background: linear-gradient(90deg, #7C3AED 0%, #A78BFA 100%); border-radius: 999px; transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }

      /* ── UTILITIES ── */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      .hover-lift { transition: all 0.25s cubic-bezier(0.16,1,0.3,1); }
      .hover-lift:hover { transform: translateY(-3px); }

      .text-gradient-coral,
      .text-gradient-teal,
      .text-gradient-purple {
        background: linear-gradient(135deg, #A78BFA 0%, #7C3AED 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .notif-dot {
        width: 8px; height: 8px;
        background: var(--im-purple);
        border-radius: 50%;
        border: 2px solid var(--im-black);
        position: absolute;
        top: -2px; right: -2px;
      }

      /* ── ONBOARDING STEPS ── */
      .step-done    { background: #10B981; color: white; }
      .step-active  { background: var(--im-purple); color: white; box-shadow: 0 4px 12px rgba(124,58,237,0.4); }
      .step-pending { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.07); }

      /* ── NAV ── */
      .nav-active   { color: var(--im-purple-l); }
      .nav-inactive { color: rgba(255,255,255,0.3); }

      /* ── ESCROW ── */
      .escrow-held     { background: rgba(245,158,11,0.10); border: 1px solid rgba(245,158,11,0.22); color: #F59E0B; }
      .escrow-released { background: rgba(16,185,129,0.10); border: 1px solid rgba(16,185,129,0.22); color: #10B981; }
      .escrow-disputed { background: rgba(239,68,68,0.10);  border: 1px solid rgba(239,68,68,0.22);  color: #EF4444; }

      /* ── BLOBS ── */
      .blob-coral, .blob-teal {
        background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
        border-radius: 50%;
        filter: blur(60px);
        pointer-events: none;
      }

      /* ── DELAYS ── */
      .delay-1 { animation-delay: 50ms; }
      .delay-2 { animation-delay: 100ms; }
      .delay-3 { animation-delay: 150ms; }
      .delay-4 { animation-delay: 200ms; }
      .delay-5 { animation-delay: 250ms; }
      .delay-6 { animation-delay: 300ms; }

      /* ── MISC ── */
      .chart-bar   { border-radius: 4px 4px 0 0; transition: height 0.6s cubic-bezier(0.16,1,0.3,1); min-height: 4px; }
      select.input-dark option { background: var(--im-surface); color: white; }
      *:focus-visible { outline: 2px solid var(--im-purple); outline-offset: 2px; border-radius: 4px; }

      /* ── PHOTO OVERLAY ── */
      .photo-overlay {
        background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.35) 55%, transparent 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
