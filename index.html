<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I Mendly | Smart Home Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            surface: '#FFFFFF',
            canvas: '#F3F3F2',
            border: 'rgba(0,0,0,0.07)',
            green: {
              50: '#F0FDF6',
              100: '#DCFCE9',
              200: '#BBF7D3',
              300: '#86EFAC',
              400: '#4ADE80',
              500: '#10C96D',
              600: '#0EA85C',
              700: '#0B874A',
              800: '#06673A',
              900: '#044D2C',
            },
            ink: {
              DEFAULT: '#0D0D0D',
              secondary: '#6B6B6B',
              muted: '#B0B0B0',
              faint: '#EFEFEE',
            },
            brand: {
              green: '#10C96D',
            }
          },
          boxShadow: {
            'xs': '0 1px 4px rgba(0,0,0,0.06)',
            'card': '0 2px 16px rgba(0,0,0,0.07)',
            'float': '0 8px 32px rgba(0,0,0,0.1)',
            'up': '0 -4px 20px rgba(0,0,0,0.06)',
            'green': '0 4px 24px rgba(16,201,109,0.3)',
          },
          borderRadius: {
            '4xl': '2rem',
            '5xl': '2.5rem',
          },
          animation: {
            'card-in': 'cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both',
            'fade-in': 'fadeIn 0.4s ease both',
            'slide-up': 'slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both',
            'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both',
            'float': 'float 5s ease-in-out infinite',
            'float-slow': 'float 8s ease-in-out infinite',
            'float-slower': 'float 12s ease-in-out infinite',
            'pulse-dot': 'pulseDot 2s ease-in-out infinite',
            'shimmer': 'shimmer 2.5s ease-in-out infinite',
            'morph': 'morph 8s ease-in-out infinite',
            'gradient-shift': 'gradientShift 6s ease-in-out infinite',
            'spring-in': 'springIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both',
            'spin-up': 'spinUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) both',
            'ring-fill': 'ringFill 1.5s cubic-bezier(0.22, 1, 0.36, 1) both',
            'progress-fill': 'progressFill 1s cubic-bezier(0.22, 1, 0.36, 1) both',
            'ripple': 'ripple 0.6s ease-out',
            'glow-pulse': 'glowPulse 3s ease-in-out infinite',
            'drift': 'drift 20s ease-in-out infinite',
            'drift-reverse': 'drift 25s ease-in-out infinite reverse',
          },
          keyframes: {
            cardIn: {
              '0%': { opacity: '0', transform: 'scale(0.97) translateY(8px)' },
              '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            pop: {
              '0%': { opacity: '0', transform: 'scale(0.92)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-8px)' },
            },
            pulseDot: {
              '0%, 100%': { transform: 'scale(1)', opacity: '1' },
              '50%': { transform: 'scale(1.3)', opacity: '0.7' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-200% center' },
              '100%': { backgroundPosition: '200% center' },
            },
            morph: {
              '0%, 100%': { borderRadius: '60% 40% 30% 70% / 60% 30% 70% 40%' },
              '25%': { borderRadius: '30% 60% 70% 40% / 50% 60% 30% 60%' },
              '50%': { borderRadius: '50% 60% 30% 60% / 30% 70% 50% 60%' },
              '75%': { borderRadius: '60% 30% 60% 40% / 70% 40% 60% 30%' },
            },
            gradientShift: {
              '0%, 100%': { backgroundPosition: '0% 50%' },
              '50%': { backgroundPosition: '100% 50%' },
            },
            springIn: {
              '0%': { opacity: '0', transform: 'scale(0.3) translateY(20px)' },
              '50%': { opacity: '1', transform: 'scale(1.05) translateY(-3px)' },
              '70%': { transform: 'scale(0.97) translateY(1px)' },
              '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
            },
            spinUp: {
              '0%': { opacity: '0', transform: 'translateY(15px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            ringFill: {
              '0%': { strokeDashoffset: '251' },
              '100%': { strokeDashoffset: 'var(--ring-target, 60)' },
            },
            progressFill: {
              '0%': { width: '0%' },
              '100%': { width: 'var(--progress-target, 50%)' },
            },
            ripple: {
              '0%': { transform: 'scale(0)', opacity: '0.5' },
              '100%': { transform: 'scale(4)', opacity: '0' },
            },
            glowPulse: {
              '0%, 100%': { boxShadow: '0 0 20px rgba(16,201,109,0.15)' },
              '50%': { boxShadow: '0 0 40px rgba(16,201,109,0.35)' },
            },
            drift: {
              '0%': { transform: 'translate(0, 0) scale(1)' },
              '25%': { transform: 'translate(30px, -20px) scale(1.05)' },
              '50%': { transform: 'translate(-10px, 15px) scale(0.95)' },
              '75%': { transform: 'translate(-25px, -10px) scale(1.02)' },
              '100%': { transform: 'translate(0, 0) scale(1)' },
            },
          },
        },
      },
    }
  </script>
  <style>
    * {
      box-sizing: border-box;
    }

    ::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    body {
      background: #F3F3F2;
      -webkit-tap-highlight-color: transparent;
    }

    /* Base card */
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    /* Pill-shaped element */
    .pill {
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
    }

    /* Status tag */
    .tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
    }

    /* Primary CTA */
    .btn-primary {
      background: #10C96D;
      color: #fff;
      font-weight: 700;
      border-radius: 999px;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background: #0EB863;
      transform: translateY(-1px);
      box-shadow: 0 4px 24px rgba(16, 201, 109, 0.35);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    /* Ghost button */
    .btn-ghost {
      background: rgba(0, 0, 0, 0.05);
      color: #0D0D0D;
      font-weight: 600;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.06);
      transition: all 0.2s;
    }

    .btn-ghost:hover {
      background: rgba(0, 0, 0, 0.08);
    }

    /* Input field */
    .input-field {
      background: #F7F7F6;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 14px;
      color: #0D0D0D;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-field::placeholder {
      color: #B0B0B0;
    }

    .input-field:focus {
      border-color: rgba(16, 201, 109, 0.5);
      box-shadow: 0 0 0 3px rgba(16, 201, 109, 0.08);
    }

    /* Stagger delays */
    .delay-1 {
      animation-delay: 0.05s;
    }

    .delay-2 {
      animation-delay: 0.10s;
    }

    .delay-3 {
      animation-delay: 0.15s;
    }

    .delay-4 {
      animation-delay: 0.20s;
    }

    .delay-5 {
      animation-delay: 0.25s;
    }

    .delay-6 {
      animation-delay: 0.30s;
    }

    /* Card hover micro-animation */
    .card-hover {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .card-hover:hover {
      transform: translateY(-2px) scale(1.005);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .card-hover:active {
      transform: scale(0.99);
    }

    /* Green dot indicator */
    .green-dot {
      width: 8px;
      height: 8px;
      background: #10C96D;
      border-radius: 50%;
      animation: pulseDot 2s ease-in-out infinite;
    }

    /* Shimmer button overlay */
    .btn-shimmer {
      position: relative;
      overflow: hidden;
    }

    .btn-shimmer::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(105deg,
          transparent 40%,
          rgba(255, 255, 255, 0.3) 45%,
          rgba(255, 255, 255, 0.5) 50%,
          rgba(255, 255, 255, 0.3) 55%,
          transparent 60%);
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
    }

    /* Animated gradient mesh background */
    .gradient-mesh {
      background: linear-gradient(-45deg,
          #F3F3F2 0%,
          #E8FBF1 25%,
          #F3F3F2 50%,
          #F0FDF6 75%,
          #F3F3F2 100%);
      background-size: 400% 400%;
      animation: gradientShift 6s ease-in-out infinite;
    }

    /* Morphing blob shape */
    .morph-blob {
      animation: morph 8s ease-in-out infinite;
    }

    /* SVG ring chart base */
    .ring-chart circle.ring-bg {
      fill: none;
      stroke: #F3F3F2;
      stroke-width: 4;
    }

    .ring-chart circle.ring-fill {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 251;
      animation: ringFill 1.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* Dot grid pattern */
    .dot-grid {
      background-image: radial-gradient(circle, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* Ripple button */
    .btn-ripple {
      position: relative;
      overflow: hidden;
    }

    .btn-ripple .ripple-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      width: 20px;
      height: 20px;
      animation: ripple 0.6s ease-out forwards;
      pointer-events: none;
    }

    /* Animated progress bar */
    .progress-animated {
      animation: progressFill 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* Focus shimmer for inputs */
    .input-shimmer:focus {
      background: linear-gradient(90deg, #F7F7F6 0%, #F0FDF6 50%, #F7F7F6 100%);
      background-size: 200% 100%;
      animation: shimmer 2s ease-in-out infinite;
    }
  </style>
</head>

<body class="bg-canvas text-ink font-sans antialiased h-screen overflow-hidden">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
