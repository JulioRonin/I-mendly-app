<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="I mendly — Servicios del hogar con confianza. Conectamos clientes con profesionales verificados en México." />
    <title>I mendly — Servicios del hogar con confianza</title>

    <!-- Google Fonts: Syne + Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              syne: ['Syne', 'sans-serif'],
              jakarta: ['Plus Jakarta Sans', 'sans-serif'],
            },
            colors: {
              'im-dark':     '#060D16',
              'im-navy':     '#0F3460',
              'im-coral':    '#FF6B47',
              'im-coral-dk': '#CC4A2A',
              'im-teal':     '#0891B2',
              'im-teal-lt':  '#BAE6FD',
              'im-surface':  '#F0F9FF',
              'im-gray-600': '#475569',
              'im-gray-400': '#94A3B8',
              'im-gray-200': '#E2E8F0',
              'im-gray-100': '#F1F5F9',
              'im-success':  '#10B981',
              'im-warning':  '#F59E0B',
              'im-error':    '#EF4444',
              'im-info':     '#3B82F6',
            },
            borderRadius: {
              'pill': '999px',
            },
            boxShadow: {
              'card':    '0 1px 3px rgba(6,13,22,0.08), 0 4px 16px rgba(6,13,22,0.06)',
              'card-lg': '0 4px 8px rgba(6,13,22,0.12), 0 12px 32px rgba(6,13,22,0.10)',
              'coral':   '0 4px 24px rgba(255,107,71,0.30)',
              'teal':    '0 4px 24px rgba(8,145,178,0.30)',
              'navy':    '0 4px 24px rgba(15,52,96,0.40)',
              'glow':    '0 0 40px rgba(255,107,71,0.15)',
            },
            animation: {
              'fade-in':        'fadeIn 0.4s ease-out forwards',
              'slide-up':       'slideUp 0.45s cubic-bezier(0.16,1,0.3,1) forwards',
              'slide-down':     'slideDown 0.35s cubic-bezier(0.16,1,0.3,1) forwards',
              'scale-in':       'scaleIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards',
              'float':          'float 6s ease-in-out infinite',
              'pulse-slow':     'pulse 3s cubic-bezier(0.4,0,0.6,1) infinite',
              'shimmer':        'shimmer 2s infinite',
              'glow-pulse':     'glowPulse 2s ease-in-out infinite',
              'card-in':        'cardIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards',
              'bar-grow':       'barGrow 0.8s cubic-bezier(0.16,1,0.3,1) forwards',
              'ripple':         'ripple 0.6s ease-out forwards',
              'slide-in-right': 'slideInRight 0.4s cubic-bezier(0.16,1,0.3,1) forwards',
              'slide-in-left':  'slideInLeft 0.4s cubic-bezier(0.16,1,0.3,1) forwards',
              'spin-slow':      'spin 8s linear infinite',
            },
            keyframes: {
              fadeIn:       { from: { opacity: '0' }, to: { opacity: '1' } },
              slideUp:      { from: { opacity: '0', transform: 'translateY(24px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
              slideDown:    { from: { opacity: '0', transform: 'translateY(-16px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
              scaleIn:      { from: { opacity: '0', transform: 'scale(0.88)' }, to: { opacity: '1', transform: 'scale(1)' } },
              cardIn:       { from: { opacity: '0', transform: 'translateY(16px) scale(0.97)' }, to: { opacity: '1', transform: 'translateY(0) scale(1)' } },
              float:        { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-12px)' } },
              shimmer:      { from: { backgroundPosition: '-200% center' }, to: { backgroundPosition: '200% center' } },
              glowPulse:    { '0%,100%': { opacity: '0.5' }, '50%': { opacity: '1' } },
              barGrow:      { from: { transform: 'scaleY(0)', transformOrigin: 'bottom' }, to: { transform: 'scaleY(1)', transformOrigin: 'bottom' } },
              ripple:       { from: { transform: 'scale(0)', opacity: '0.5' }, to: { transform: 'scale(4)', opacity: '0' } },
              slideInRight: { from: { opacity: '0', transform: 'translateX(24px)' }, to: { opacity: '1', transform: 'translateX(0)' } },
              slideInLeft:  { from: { opacity: '0', transform: 'translateX(-24px)' }, to: { opacity: '1', transform: 'translateX(0)' } },
            },
            backgroundImage: {
              'gradient-dark':  'linear-gradient(135deg, #060D16 0%, #0F3460 100%)',
              'gradient-coral': 'linear-gradient(135deg, #FF6B47 0%, #CC4A2A 100%)',
              'gradient-teal':  'linear-gradient(135deg, #0891B2 0%, #0F3460 100%)',
              'gradient-glass': 'linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%)',
              'gradient-card':  'linear-gradient(180deg, rgba(15,52,96,0.6) 0%, rgba(6,13,22,0.95) 100%)',
            },
          }
        }
      }
    </script>

    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --im-dark:     #060D16;
        --im-navy:     #0F3460;
        --im-coral:    #FF6B47;
        --im-coral-dk: #CC4A2A;
        --im-teal:     #0891B2;
        --im-teal-lt:  #BAE6FD;
        --im-surface:  #F0F9FF;
        --font-display: 'Syne', sans-serif;
        --font-body:    'Plus Jakarta Sans', sans-serif;
      }

      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: var(--font-body);
        background-color: var(--im-dark);
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 999px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
      * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }

      h1, h2, h3 { font-family: var(--font-display); letter-spacing: -0.03em; }

      .glass {
        background: rgba(15, 52, 96, 0.25);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1.5px solid rgba(255, 255, 255, 0.08);
      }
      .glass-dark {
        background: rgba(6, 13, 22, 0.70);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1.5px solid rgba(255, 255, 255, 0.06);
      }
      .glass-light {
        background: rgba(240, 249, 255, 0.06);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1.5px solid rgba(240, 249, 255, 0.10);
      }
      .card-dark {
        background: linear-gradient(135deg, rgba(15,52,96,0.5) 0%, rgba(6,13,22,0.8) 100%);
        border: 1.5px solid rgba(255,255,255,0.07);
        border-radius: 16px;
      }
      .card-light {
        background: #FFFFFF;
        border: 1.5px solid #E2E8F0;
        border-radius: 16px;
        box-shadow: 0 1px 3px rgba(6,13,22,0.08), 0 4px 16px rgba(6,13,22,0.06);
      }
      .btn-coral {
        background: linear-gradient(135deg, #FF6B47 0%, #CC4A2A 100%);
        color: white;
        border: none;
        border-radius: 999px;
        font-family: var(--font-body);
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 20px rgba(255,107,71,0.35);
      }
      .btn-coral:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(255,107,71,0.45); }
      .btn-coral:active { transform: translateY(0); box-shadow: 0 2px 12px rgba(255,107,71,0.30); }
      .btn-navy {
        background: rgba(15, 52, 96, 0.8);
        color: white;
        border: 1.5px solid rgba(255,255,255,0.15);
        border-radius: 999px;
        font-family: var(--font-body);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .btn-navy:hover { background: rgba(15, 52, 96, 1); border-color: rgba(255,255,255,0.25); }
      .btn-ghost {
        background: transparent;
        color: rgba(255,255,255,0.7);
        border: 1.5px solid rgba(255,255,255,0.15);
        border-radius: 999px;
        font-family: var(--font-body);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .btn-ghost:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.25); color: white; }
      .btn-teal {
        background: linear-gradient(135deg, #0891B2 0%, #0F3460 100%);
        color: white;
        border: none;
        border-radius: 999px;
        font-family: var(--font-body);
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 20px rgba(8,145,178,0.30);
      }
      .btn-teal:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(8,145,178,0.40); }
      .input-dark {
        background: rgba(255,255,255,0.05);
        border: 1.5px solid rgba(255,255,255,0.10);
        border-radius: 12px;
        color: white;
        font-family: var(--font-body);
        font-size: 15px;
        transition: all 0.2s ease;
        outline: none;
        width: 100%;
      }
      .input-dark::placeholder { color: rgba(255,255,255,0.30); }
      .input-dark:focus { border-color: #0891B2; background: rgba(8,145,178,0.08); box-shadow: 0 0 0 3px rgba(8,145,178,0.15); }
      .badge-coral {
        background: linear-gradient(135deg, rgba(255,107,71,0.20) 0%, rgba(204,74,42,0.10) 100%);
        color: #FF6B47;
        border: 1px solid rgba(255,107,71,0.30);
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        font-family: var(--font-body);
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .badge-teal {
        background: linear-gradient(135deg, rgba(8,145,178,0.20) 0%, rgba(15,52,96,0.10) 100%);
        color: #0891B2;
        border: 1px solid rgba(8,145,178,0.30);
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        font-family: var(--font-body);
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .badge-success {
        background: rgba(16,185,129,0.15);
        color: #10B981;
        border: 1px solid rgba(16,185,129,0.25);
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        font-family: var(--font-body);
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .progress-bar { background: rgba(255,255,255,0.10); border-radius: 999px; overflow: hidden; }
      .progress-fill {
        background: linear-gradient(90deg, #0891B2 0%, #FF6B47 100%);
        border-radius: 999px;
        transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .hover-lift { transition: all 0.25s cubic-bezier(0.16,1,0.3,1); }
      .hover-lift:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(6,13,22,0.25); }
      .blob-coral {
        background: radial-gradient(circle, rgba(255,107,71,0.15) 0%, transparent 70%);
        border-radius: 50%;
        filter: blur(40px);
        pointer-events: none;
      }
      .blob-teal {
        background: radial-gradient(circle, rgba(8,145,178,0.12) 0%, transparent 70%);
        border-radius: 50%;
        filter: blur(40px);
        pointer-events: none;
      }
      .text-gradient-coral {
        background: linear-gradient(135deg, #FF6B47 0%, #FF9A7A 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .text-gradient-teal {
        background: linear-gradient(135deg, #BAE6FD 0%, #0891B2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .notif-dot {
        width: 8px; height: 8px;
        background: #FF6B47;
        border-radius: 50%;
        border: 2px solid #060D16;
        position: absolute;
        top: -2px; right: -2px;
      }
      .step-done { background: #10B981; color: white; }
      .step-active { background: linear-gradient(135deg, #FF6B47, #CC4A2A); color: white; box-shadow: 0 4px 12px rgba(255,107,71,0.35); }
      .step-pending { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); border: 1.5px solid rgba(255,255,255,0.10); }
      .nav-active { color: #FF6B47; }
      .nav-inactive { color: rgba(255,255,255,0.40); }
      .escrow-held { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.30); color: #F59E0B; }
      .escrow-released { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.30); color: #10B981; }
      .escrow-disputed { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.30); color: #EF4444; }
      .delay-1 { animation-delay: 50ms; }
      .delay-2 { animation-delay: 100ms; }
      .delay-3 { animation-delay: 150ms; }
      .delay-4 { animation-delay: 200ms; }
      .delay-5 { animation-delay: 250ms; }
      .delay-6 { animation-delay: 300ms; }
      *:focus-visible { outline: 2px solid #0891B2; outline-offset: 2px; border-radius: 4px; }
      select.input-dark option { background: #0F3460; color: white; }
      .chart-bar { border-radius: 4px 4px 0 0; transition: height 0.6s cubic-bezier(0.16,1,0.3,1); min-height: 4px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
